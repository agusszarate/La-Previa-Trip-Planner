name: Check Flight Prices

on:
  schedule:
    # Every day at 8:00 AM and 8:00 PM UTC
    - cron: '0 8,20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-flights:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger flight check cron
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set"
            exit 1
          fi
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            "${APP_URL}/api/cron?secret=${CRON_SECRET}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Flight check failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          # Parse results summary
          CHECKED=$(echo "$BODY" | jq -r '.checked // 0')
          ERRORS=$(echo "$BODY" | jq '[.results[]? | select(.status == "error")] | length')
          echo "::notice::Checked $CHECKED watches, $ERRORS errors"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::Some flight checks had errors"
            echo "$BODY" | jq '.results[] | select(.status == "error")'
          fi
