name: Check Flight Prices

on:
  schedule:
    # Every day at 8:00 AM and 8:00 PM UTC
    - cron: '0 8,20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-flights:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger flight check cron
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set"
            exit 1
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${APP_URL}/api/cron?secret=${CRON_SECRET}")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Flight check failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
